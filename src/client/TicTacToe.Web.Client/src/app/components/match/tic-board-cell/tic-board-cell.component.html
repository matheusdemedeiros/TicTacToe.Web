<button
    [disabled]="disabled"
    class="
    w-full 
    aspect-square 
    flex
    items-center
    justify-center
    rounded-xl 
    bg-zinc-800 
    text-5xl
    font-bold 
    transition"
    [ngClass]="{
      'hover:bg-zinc-700 hover:text-indigo-500 text-gray-500 cursor-pointer': !disabled && !isWinningCell,
      'opacity-60 cursor-not-allowed text-gray-600': disabled && !isWinningCell,
      'bg-indigo-500/20 border-2 border-indigo-400 text-indigo-300 shadow-lg shadow-indigo-500/20 scale-105': isWinningCell
    }"
    (click)="onClick()"
    >
    {{ symbol }}
</button>
