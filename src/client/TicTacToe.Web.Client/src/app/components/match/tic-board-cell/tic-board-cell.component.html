<button
    [disabled]="disabled"
    class="
    w-full 
    aspect-square 
    flex
    items-center
    justify-center
    rounded-xl 
    border-gray-300 
    bg-zinc-800 
    text-5xl
    font-bold 
    transition"
    [ngClass]="{
      'hover:bg-zinc-700 hover:text-indigo-500 text-gray-500 cursor-pointer': !disabled,
      'opacity-60 cursor-not-allowed text-gray-600': disabled
    }"
    (click)="onClick()"
    >
    {{ symbol }}
</button>
